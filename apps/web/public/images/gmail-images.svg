<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Gmail-like header bar -->
  <rect width="400" height="35" fill="#f1f3f4"/>
  <circle cx="20" cy="17" r="8" fill="#ea4335"/>
  <rect x="35" y="12" width="150" height="10" rx="5" fill="#e8eaed"/>
  
  <!-- Message content area -->
  <rect y="35" width="400" height="85" fill="#ffffff"/>
  
  <!-- Yellow warning bar -->
  <rect y="40" width="400" height="30" fill="#fef7e0"/>
  
  <!-- Images icon -->
  <rect x="15" y="48" width="16" height="14" rx="2" fill="#f9ab00"/>
  <circle cx="20" cy="52" r="2" fill="#ffffff"/>
  <polygon points="16,59 22,54 28,59" fill="#ffffff" opacity="0.7"/>
  
  <!-- Text -->
  <text x="40" y="53" font-family="Roboto, Arial, sans-serif" font-size="11" fill="#5f6368">
    Images are not displayed.
  </text>
  <text x="40" y="66" font-family="Roboto, Arial, sans-serif" font-size="11" fill="#1a73e8" font-weight="500" style="cursor: pointer;">
    Display images below
  </text>
  
  <!-- Sender info -->
  <circle cx="25" cy="95" r="12" fill="#1a73e8"/>
  <text x="25" y="99" font-family="Roboto, Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">SC</text>
  <text x="45" y="92" font-family="Roboto, Arial, sans-serif" font-size="12" fill="#202124">SyndCal</text>
  <text x="45" y="106" font-family="Roboto, Arial, sans-serif" font-size="10" fill="#5f6368">to me</text>
</svg>
